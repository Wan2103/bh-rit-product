<!--
    gallery.html

    Reusable image gallery component

    Dynamic values:
    {{gallery_title}}
    {{images}}

    Expected image object:
    {
        src: "image.webp",
        alt: "description"
    }
-->


<section class="gallery" data-gallery>


    <div class="gallery__container">


        <!-- Gallery Header -->

        <div class="gallery__header">


            <h2 class="gallery__title">

                {{gallery_title}}

            </h2>


        </div>




        <!-- Gallery Grid -->

        <div class="gallery__grid">



            {{images}}



            <!--

            Example generated item:

            <div class="gallery__item">


                <img
                    src="assets/images/products/dji/gallery1.webp"
                    alt="DJI Product Gallery"
                    loading="lazy"
                    data-gallery-image
                >


            </div>

            -->



        </div>



    </div>


</section>
