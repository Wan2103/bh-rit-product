<!--
    featureCard.html

    Reusable feature card component
    Used for:
    - Product features
    - Company solutions
    - Industry highlights

    Dynamic values:
    {{icon}}
    {{title}}
    {{description}}
-->


<div class="feature-card" data-feature-card>


    <div class="feature-card__icon">


        <img
            src="{{icon}}"
            alt="{{title}} icon"
            loading="lazy"
        >


    </div>



    <div class="feature-card__content">


        <h3 class="feature-card__title">

            {{title}}

        </h3>



        <p class="feature-card__description">

            {{description}}

        </p>


    </div>



</div>
