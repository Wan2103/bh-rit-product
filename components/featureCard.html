<div class="feature-card">
    <div class="feature-card__icon">
        <img src="{{icon}}" alt="{{title}}">
    </div>

    <div class="feature-card__content">
        <h3 class="feature-card__title">
            {{title}}
        </h3>

        <p class="feature-card__description">
            {{description}}
        </p>
    </div>
</div>
